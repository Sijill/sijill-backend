openapi: 3.0.3
info:
  title: Sijill - Patient Module API
  version: 1.0.0
  description: |
    Complete API documentation for the Patient (mobile app) module of Sijill. This module handles:
      - Medical identity overview (basic info, active diagnoses, medications, allergies, chronic conditions, emergency contacts)
      - Medical history (encounter list & detail)
      - Reminders (list, counters, today schedule, update/dismiss)
      - Notifications (list, consume pending, mark read)
      - Health journal (diagnoses, notes, AI health snapshots)
      - Profile picture upload & retrieval
      - Emergency contact management (add/remove)
      - AI Chat Assistant (chat sessions, messaging, AI-powered health Q&A)

    ## Authentication
    All endpoints require a standard user JWT access token with the PATIENT role.

    **User Bearer Token** (`UserBearerAuth`)
      - Regular JWT access token for patients
      - Header: `Authorization: Bearer <jwt_access_token>`

servers:
  - url: http://localhost:8000/api/v1
    description: Development server

paths:
  # --------------------------------------------------------------------------
  # MEDICAL IDENTITY
  # --------------------------------------------------------------------------
  /patient/medical-identity:
    get:
      summary: Get patient medical identity
      description: |
        **Role:** PATIENT

        Returns the patient's basic medical identity including age, gender, blood type,
        BMI, active diagnoses, current medications, allergies, chronic conditions,
        and emergency contacts.
      tags: [Medical Identity]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Patient medical identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalIdentityResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patient profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # MEDICAL HISTORY
  # --------------------------------------------------------------------------
  /patient/medical-history:
    get:
      summary: List medical history
      description: |
        **Role:** PATIENT

        Returns a list of the patient's clinical encounters, ordered by date
        (most recent first). Each entry includes the doctor name, speciality,
        date, location, and primary diagnosis.
      tags: [Medical History]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Medical history list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalHistoryListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patient profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/medical-history/{encounterId}:
    get:
      summary: Get encounter details
      description: |
        **Role:** PATIENT

        Returns the full details of a specific encounter including symptoms,
        diagnoses, and prescribed medications.
      tags: [Medical History]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/EncounterId'
      responses:
        '200':
          description: Full encounter detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncounterDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Encounter not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # REMINDERS
  # --------------------------------------------------------------------------
  /patient/reminders:
    get:
      summary: List all active reminders
      description: |
        **Role:** PATIENT

        Returns all active reminders (medications, appointments, medical orders)
        for the authenticated patient, grouped by type.
      tags: [Reminders]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Active reminders list (grouped)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRemindersResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/reminders/active:
    get:
      summary: List all active reminders (alias)
      description: |
        **Role:** PATIENT

        Identical to GET /patient/reminders. Returns all active reminders grouped by type.
      tags: [Reminders]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Active reminders list (grouped)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRemindersResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/home/reminders/counters:
    get:
      summary: Get home reminder counters
      description: |
        **Role:** PATIENT

        Returns counts of active medication reminders, upcoming appointments,
        and pending test orders for the patient's home screen.
      tags: [Reminders]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Reminder counters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeReminderCountersResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/home/today-schedule:
    get:
      summary: Get today's schedule
      description: |
        **Role:** PATIENT

        Returns the patient's scheduled items for today (medication times,
        appointments, pending test orders) sorted by time.
      tags: [Reminders]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Today's schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayScheduleResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/reminders/{reminderId}:
    patch:
      summary: Update or dismiss a reminder
      description: |
        **Role:** PATIENT

        Updates a reminder's time, custom days, or dismisses it (is_active=false).
        Only medication reminders can customize reminder_time or custom_days.
        Only medical order reminders can be dismissed by the patient.
      tags: [Reminders]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/ReminderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReminderRequest'
      responses:
        '200':
          description: Reminder updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateReminderResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Reminder not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # NOTIFICATIONS
  # --------------------------------------------------------------------------
  /patient/notifications:
    get:
      summary: List all notifications
      description: |
        **Role:** PATIENT

        Returns all notifications for the authenticated patient, ordered by
        created date descending.
      tags: [Notifications]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNotificationsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/notifications/pending:
    get:
      summary: Consume pending notifications
      description: |
        **Role:** PATIENT

        Atomically fetches and marks all due (scheduled_for <= NOW) pending
        notifications as SENT. Used by the mobile app to pull new notifications
        that are ready to be displayed.
      tags: [Notifications]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Pending notifications consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNotificationsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/notifications/{notificationId}/read:
    patch:
      summary: Mark notification as read
      description: |
        **Role:** PATIENT

        Marks a single notification as READ.
      tags: [Notifications]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkNotificationReadResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # HEALTH JOURNAL
  # --------------------------------------------------------------------------
  /patient/health-journal/diagnoses:
    get:
      summary: List active diagnoses for health journal
      description: |
        **Role:** PATIENT

        Returns all active diagnoses that the patient can write health journal
        entries about.
      tags: [Health Journal]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Active diagnoses list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDiagnosesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/health-journal/notes:
    post:
      summary: Create a health journal entry
      description: |
        **Role:** PATIENT

        Creates a new health journal note for a specific diagnosis. Also
        generates an AI health snapshot (urgency level, summary, advice,
        watchouts, when to contact doctor) using the patient's medical context
        if GEMINI_API_KEY is configured.
      tags: [Health Journal]
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHealthJournalEntryRequest'
      responses:
        '201':
          description: Health journal entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateHealthJournalEntryResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patient or diagnosis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List health journal diagnoses summary
      description: |
        **Role:** PATIENT

        Returns a summary of all diagnoses that have health journal entries,
        including total entry count, last entry date, and the last recorded
        outcome, pain level, energy level, and mood.
      tags: [Health Journal]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Health journal diagnoses summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDiagnosesSummaryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/health-journal/notes/{diagnosisId}:
    get:
      summary: List health journal notes for a diagnosis
      description: |
        **Role:** PATIENT

        Returns all health journal notes for a specific diagnosis, ordered by
        note date descending.
      tags: [Health Journal]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/DiagnosisId'
      responses:
        '200':
          description: Health journal notes list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalNotesListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Diagnosis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # PROFILE PICTURE
  # --------------------------------------------------------------------------
  /patient/profile-picture:
    post:
      summary: Upload profile picture
      description: |
        **Role:** PATIENT

        Uploads a profile picture for the patient. Accepts common image formats
        (JPEG, PNG, WebP). Max file size of 5 MB.
      tags: [Profile Picture]
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [profilePicture]
              properties:
                profilePicture:
                  type: string
                  format: binary
                  description: Profile picture file (image)
      responses:
        '201':
          description: Profile picture uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Bad request - no file uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get profile picture
      description: |
        **Role:** PATIENT

        Streams the patient's current profile picture file inline.
      tags: [Profile Picture]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Profile picture file stream
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No profile picture set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # EMERGENCY CONTACTS
  # --------------------------------------------------------------------------
  /patient/emergency-contacts:
    post:
      summary: Add emergency contact
      description: |
        **Role:** PATIENT

        Adds an emergency contact for the patient. If isPrimary is true, any
        existing primary contact is demoted to non-primary.
      tags: [Emergency Contacts]
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddEmergencyContactRequest'
      responses:
        '201':
          description: Emergency contact added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddEmergencyContactResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/emergency-contacts/{contactId}:
    delete:
      summary: Remove emergency contact
      description: |
        **Role:** PATIENT

        Removes an emergency contact by ID.
      tags: [Emergency Contacts]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/ContactId'
      responses:
        '200':
          description: Emergency contact removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Emergency contact not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # AI CHAT ASSISTANT
  # --------------------------------------------------------------------------
  /patient/ai/chat/sessions:
    post:
      summary: Create a new chat session
      description: |
        **Role:** PATIENT

        Creates a new AI chat session for the patient. If no title is provided,
        it will be auto-generated from the first message sent in the session.
      tags: [AI Chat]
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          description: Bad request - max sessions reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patient profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List chat sessions
      description: |
        **Role:** PATIENT

        Returns all chat sessions for the authenticated patient, ordered by
        most recently updated. Each session includes a preview of the last
        assistant message.
      tags: [AI Chat]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [ACTIVE, ARCHIVED]
          description: Filter by session status
      responses:
        '200':
          description: Chat sessions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSessionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete all chat sessions
      description: |
        **Role:** PATIENT

        Permanently deletes all chat sessions and their messages for the authenticated patient.
      tags: [AI Chat]
      security: [{ UserBearerAuth: [] }]
      responses:
        '200':
          description: Sessions deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAllSessionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patient profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/ai/chat/sessions/{sessionId}:
    get:
      summary: Get chat session with messages
      description: |
        **Role:** PATIENT

        Returns a specific chat session with all its messages ordered by creation time.
      tags: [AI Chat]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Chat session with messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSessionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Chat session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update chat session (archive / rename)
      description: |
        **Role:** PATIENT

        Updates the session status (ACTIVE/ARCHIVED) or title.
      tags: [AI Chat]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSessionResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Chat session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Archive a chat session
      description: |
        **Role:** PATIENT

        Archives (soft-deletes) a chat session by setting its status to ARCHIVED.
      tags: [AI Chat]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSessionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Chat session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /patient/ai/chat/sessions/{sessionId}/messages:
    post:
      summary: Send a message to the AI assistant
      description: |
        **Role:** PATIENT

        Sends a message in an active chat session and receives an AI-generated
        response. The AI has access to the patient's medical data (diagnoses,
        medications, allergies, etc.) and conversation history.

        **Rate limit:** 10 messages per minute per patient.
      tags: [AI Chat]
      security: [{ UserBearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          description: Bad request - validation error or max messages reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Chat session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests - rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  # --------------------------------------------------------------------------
  # SECURITY SCHEMES
  # --------------------------------------------------------------------------
  securitySchemes:
    UserBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Standard user JWT access token for patients

  # --------------------------------------------------------------------------
  # REUSABLE PARAMETERS
  # --------------------------------------------------------------------------
  parameters:
    EncounterId:
      name: encounterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Clinical encounter UUID

    ReminderId:
      name: reminderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Reminder UUID

    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Notification UUID

    DiagnosisId:
      name: diagnosisId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Diagnosis UUID

    ContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Emergency contact UUID

    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: AI chat session UUID

  # --------------------------------------------------------------------------
  # SCHEMAS
  # --------------------------------------------------------------------------
  schemas:
    # --- Enums ---
    ReminderType:
      type: string
      enum: [MEDICATION, APPOINTMENT, MEDICAL_ORDER]

    NotificationStatus:
      type: string
      enum: [PENDING, SENT, READ]

    NotificationType:
      type: string
      enum: [SYSTEM, REMINDER]

    PatientOutcome:
      type: string
      enum: [FULLY_RECOVERED, IMPROVED, NO_CHANGE, WORSE]

    BloodType:
      type: string
      enum: ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-', UNKNOWN]

    EmergencyContactRelationship:
      type: string
      enum: [PARENT, SPOUSE, SIBLING, FRIEND, CAREGIVER, OTHER]

    HealthSnapshotUrgency:
      type: string
      enum: [LOW, MEDIUM, HIGH, UNKNOWN]

    # --- Common ---
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
        statusCode:
          type: integer

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    # --- Medical Identity ---
    MedicalIdentityResponse:
      type: object
      properties:
        basicInfo:
          type: object
          properties:
            age:
              type: integer
            gender:
              type: string
            bloodType:
              type: string
              nullable: true
            weightKg:
              type: number
              nullable: true
            heightCm:
              type: number
              nullable: true
            bmi:
              type: number
              nullable: true
        activeDiagnoses:
          type: array
          items:
            type: object
            properties:
