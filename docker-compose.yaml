version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sijill-postgres
    environment:
      POSTGRES_USER: sijill
      POSTGRES_PASSWORD: sijill
      POSTGRES_DB: sijill
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/modules/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - sijill-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sijill"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: sijill-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - sijill-network

  icd-api:
    image: whoicd/icd-api
    container_name: sijill-icd-api
    environment:
      acceptLicense: "true"
      saveAnalytics: "false"
    ports:
      - "8081:80"
    networks:
      - sijill-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider --header='API-Version: v2' --header='Accept-Language: en' 'http://127.0.0.1/icd/release/11/2026-01/mms/search?q=asthma&highlightingEnabled=false&medicalCodingMode=true'",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sijill-api
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sijill
      DB_USER: sijill
      DB_PASSWORD: sijill
      
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM_EMAIL: sijill@email.gov
      SMTP_FROM_NAME: Sijill
      ICD_API_URL: http://icd-api
      
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}

    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
      icd-api:
        condition: service_healthy
    networks:
      - sijill-network
    restart: unless-stopped

networks:
  sijill-network:
    driver: bridge

volumes:
  postgres_data:
